<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
        }

        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
            margin-top: 80px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .navbar {
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .dark-mode {
            background: #121212 !important;
            color: white;
        }

        .dark-mode .form-container {
            background: #1e1e1e;
            color: white;
        }
    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">📝 TodoApp</a>

        <div class="d-flex">
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Login</a>
            <a href="{% url 'signup' %}" class="btn btn-warning btn-sm">Signup</a>

            <!-- Dark Mode -->
            <button onclick="toggleDarkMode()" class="btn btn-outline-light btn-sm ms-2">
                🌙
            </button>
        </div>
    </div>
</nav>

<!-- 🔥 SIGNUP FORM -->
<div class="container">
    <div class="form-container">

        <h2 class="text-center mb-4 text-primary fw-bold">🆕 Signup</h2>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password">
            </div>

            <button type="submit" class="btn btn-primary w-100">Signup</button>

            <p class="text-center mt-3">
                Already have an account? 
                <a href="{% url 'login' %}">Login</a>
            </p>
        </form>

    </div>
</div>

<!-- 🔥 DARK MODE SCRIPT -->
<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
    }
}
</script>

</body>
</html>
