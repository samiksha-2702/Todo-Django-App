<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
        }

        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            margin: auto;
            margin-top: 60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .navbar {
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">📝 TodoApp</a>

        <div class="d-flex">
            {% if user.is_authenticated %}
                <span class="text-white me-3">Hello, {{ user.username }}</span>
                <a href="{% url 'logout' %}?next=/accounts/login/" 
                   class="btn btn-outline-light btn-sm">
                    Logout
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">
                    Login
                </a>
                <a href="{% url 'signup' %}" class="btn btn-warning btn-sm">
                    Signup
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- 🔥 FORM -->
<div class="container">
    <div class="form-container">

        <h2 class="text-center mb-4 text-primary fw-bold">✏️ Edit Task</h2>

        <div class="alert alert-danger d-none" id="errorMsg"></div>

        <form method="POST" onsubmit="return validateForm()">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Task Title</label>
                <input type="text" id="title" name="title" 
                       value="{{ task.title }}" 
                       class="form-control" 
                       placeholder="Enter task">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Due Date</label>
                <input type="date" id="due_date" name="due_date" 
                       value="{{ task.due_date|date:'Y-m-d' }}" 
                       class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select name="priority" id="priority" class="form-select">
                    <option value="Low" {% if task.priority == "Low" %}selected{% endif %}>Low</option>
                    <option value="High" {% if task.priority == "High" %}selected{% endif %}>High</option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary w-100">Update</button>
                <a href="/" class="btn btn-secondary w-100">Back</a>
            </div>
        </form>

    </div>
</div>

<script>
    function validateForm() {
        let title = document.getElementById("title").value.trim();
        let errorMsg = document.getElementById("errorMsg");

        if (title === "") {
            errorMsg.classList.remove("d-none");
            errorMsg.innerText = "Task title cannot be empty!";
            return false;
        }

        errorMsg.classList.add("d-none");
        return true;
    }
</script>

</body>
</html>
